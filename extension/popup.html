<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo">MindVault</div>
      <p class="subtitle">Save to your universe</p>

      <div id="error" class="error hidden"></div>
      <div id="success" class="success hidden">Saved! ✅</div>

      <div id="tokenSection">
        <p class="subtitle">Pehli baar apna JWT token paste karo</p>
        <div class="form-group">
          <label>Token</label>
          <textarea id="tokenInput" placeholder="eyJhbGc..." rows="3"></textarea>
        </div>
        <button id="saveTokenBtn" class="save-btn">Save Token</button>
      </div>

      <div id="formSection" class="hidden">
        <div class="form-group">
          <label>Type</label>
          <select id="type">
            <option value="url">URL</option>
            <option value="text">Text</option>
            <option value="image">Image</option>
            <option value="pdf">PDF</option>
          </select>
        </div>

        <div class="form-group">
          <label>Title</label>
          <input type="text" id="title" placeholder="Title..." />
        </div>

        <div class="form-group">
          <label>Content</label>
          <textarea id="content" placeholder="Content..." rows="3"></textarea>
        </div>

        <div class="form-group">
          <label>Source URL</label>
          <input type="text" id="sourceUrl" placeholder="https://..." />
        </div>

        <button id="saveBtn" class="save-btn">Save to MindVault</button>
      </div>

    </div>
    <script src="popup.js"></script>
  </body>
</html>
